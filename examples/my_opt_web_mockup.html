<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDA_opt Yosys 浼樺寲宸ヤ綔鍙?/title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #eef3f7;
      --line: #c8d2dc;
      --text: #17212b;
      --muted: #5c6b78;
      --blue: #1769aa;
      --green: #18855d;
      --red: #b83b3b;
      --yellow: #9b6b12;
      --radius: 6px;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: #111922;
      color: #fff;
      border-bottom: 3px solid var(--blue);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand span:last-child {
      color: #b9c7d4;
      font-size: 13px;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button, select {
      height: 34px;
      border: 1px solid #8fa4b7;
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }

    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }

    main {
      display: grid;
      grid-template-columns: 280px minmax(520px, 1fr) 330px;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 56px);
    }

    section, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-width: 0;
    }

    .section-title {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
      font-weight: 700;
    }

    .flow {
      padding: 12px;
    }

    .flow-group {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      background: #fff;
    }

    .flow-group h3 {
      margin: 0;
      padding: 10px 12px;
      font-size: 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    .pass-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #e7edf2;
      font-size: 13px;
    }

    .pass-row:last-child { border-bottom: 0; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      justify-self: center;
    }

    .tag {
      border: 1px solid #b7c6d2;
      border-radius: var(--radius);
      padding: 2px 6px;
      color: var(--muted);
      font-size: 12px;
      background: #f7fafc;
    }

    .workspace {
      display: grid;
      grid-template-rows: 1fr 260px;
      gap: 14px;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      min-height: 0;
    }

    textarea, pre {
      width: 100%;
      height: calc(100% - 42px);
      margin: 0;
      border: 0;
      resize: none;
      padding: 14px;
      background: #101820;
      color: #d7e7f4;
      font: 13px/1.55 Consolas, "Cascadia Code", monospace;
      overflow: auto;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    pre {
      background: #0f1720;
      white-space: pre-wrap;
    }

    .netlist {
      height: 100%;
      padding: 12px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
    }

    .canvas {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(#e8eef4 1px, transparent 1px),
        linear-gradient(90deg, #e8eef4 1px, transparent 1px);
      background-size: 24px 24px;
      position: relative;
      overflow: hidden;
    }

    .node {
      position: absolute;
      width: 96px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--blue);
      border-radius: var(--radius);
      background: #fff;
      font: 12px Consolas, monospace;
      font-weight: 700;
    }

    .wire {
      position: absolute;
      height: 2px;
      background: #526575;
      transform-origin: left center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fbfcfd;
    }

    .metric label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 22px;
    }

    .good { color: var(--green); }
    .bad { color: var(--red); }
    .warn { color: var(--yellow); }

    .right-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
    }

    .side-body {
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #e3eaf0;
      text-align: left;
      padding: 8px 6px;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #f8fafc;
    }

    .log {
      height: 100%;
      min-height: 230px;
      color: #dcebf7;
    }

    @media (max-width: 1180px) {
      main {
        grid-template-columns: 250px 1fr;
      }
      .right-panel {
        grid-column: 1 / -1;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
      }
      .right-panel section:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      header {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
      }
      main, .editor-grid, .netlist, .right-panel {
        grid-template-columns: 1fr;
      }
      main {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span>EDA_opt Yosys 浼樺寲宸ヤ綔鍙?/span>
      <span>浠?Yosys pass 涓轰富浣撶殑閫昏緫缁煎悎瀹為獙骞冲彴</span>
    </div>
    <div class="toolbar">
      <select aria-label="閫夋嫨椤跺眰妯″潡">
        <option>top</option>
        <option>alu_core</option>
        <option>ctrl_path</option>
      </select>
      <button>瀵煎叆 Verilog</button>
      <button class="primary">杩愯浼樺寲</button>
    </div>
  </header>

  <main>
    <aside>
      <div class="section-title">浼樺寲娴佺▼ <span class="tag">Yosys pass</span></div>
      <div class="flow">
        <div class="flow-group">
          <h3>鍩虹浼樺寲</h3>
          <div class="pass-row"><span class="dot"></span><span>my_opt_expr</span><span class="tag">甯搁噺鎶樺彔</span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_strength</span><span class="tag">寮哄害鍓婂噺</span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_cse</span><span class="tag">鍏叡瀛愯〃杈惧紡</span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_dce</span><span class="tag">姝讳唬鐮佸垹闄?/span></div>
        </div>
        <div class="flow-group">
          <h3>浠ｆ暟涓庡绾т紭鍖?/h3>
          <div class="pass-row"><span class="dot"></span><span>my_opt_rewrite</span><span class="tag">鍚彂寮忛噸鍐?/span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_algdiv</span><span class="tag">浠ｆ暟闄ゆ硶</span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_kernel</span><span class="tag">kernel 鎻愬彇</span></div>
        </div>
        <div class="flow-group">
          <h3>涓ょ骇閫昏緫浼樺寲</h3>
          <div class="pass-row"><span class="dot"></span><span>my_opt_cover</span><span class="tag">瑕嗙洊鍘诲啑浣?/span></div>
          <div class="pass-row"><span class="dot"></span><span>my_opt_qm</span><span class="tag">QM 绮剧‘鍖栫畝</span></div>
        </div>
        <div class="flow-group">
          <h3>鏃跺簭鍒嗘瀽</h3>
          <div class="pass-row"><span class="dot"></span><span>my_opt_timing</span><span class="tag">slack / 鍏抽敭璺緞</span></div>
        </div>
      </div>
    </aside>

    <section class="workspace">
      <div class="editor-grid">
        <section>
          <div class="section-title">Verilog 婧愮爜 <span class="tag">杈撳叆</span></div>
          <textarea spellcheck="false">module top(input a, b, c, d, sel, output y, z);
  wire n1 = a & b;
  wire n2 = a & c;
  wire n3 = n1 | n2;
  assign y = sel ? n3 : (a & d);
  assign z = (a & b) | (a & c) | (a & d);
endmodule</textarea>
        </section>
        <section>
          <div class="section-title">Yosys 鑴氭湰 <span class="tag">鑷姩鐢熸垚</span></div>
          <textarea spellcheck="false">read_verilog input.v
hierarchy -check -top top
proc; opt_clean
my_opt_expr
my_opt_strength
my_opt_cse
my_opt_dce
my_opt_rewrite
my_opt_algdiv
my_opt_kernel
my_opt_cover
my_opt_qm
my_opt_timing -target 3.0
write_json result.json</textarea>
        </section>
      </div>

      <section>
        <div class="section-title">缃戣〃瑙嗗浘 <span class="tag">鍓嶅悗瀵规瘮</span></div>
        <div class="netlist">
          <div class="canvas" aria-label="缃戣〃绀烘剰鍥?>
            <div class="node" style="left: 28px; top: 38px;">a</div>
            <div class="node" style="left: 28px; top: 130px;">b/c/d</div>
            <div class="wire" style="left: 124px; top: 58px; width: 110px;"></div>
            <div class="wire" style="left: 124px; top: 150px; width: 110px;"></div>
            <div class="node" style="left: 232px; top: 84px;">factor a</div>
            <div class="wire" style="left: 328px; top: 104px; width: 116px;"></div>
            <div class="node" style="left: 442px; top: 84px;">y / z</div>
          </div>
          <div class="metrics">
            <div class="metric"><label>鍗曞厓鏁伴噺</label><strong>42 -> 29</strong></div>
            <div class="metric"><label>浼樺寲鏀剁泭</label><strong class="good">30.9%</strong></div>
            <div class="metric"><label>鏈€宸澗寮涢噺</label><strong class="good">+0.42ns</strong></div>
            <div class="metric"><label>鍏抽敭璺緞寤惰繜</label><strong>2.58ns</strong></div>
          </div>
        </div>
      </section>
    </section>

    <aside class="right-panel">
      <section>
        <div class="section-title">浼樺寲鎸囨爣 <span class="tag">鏈杩愯</span></div>
        <div class="side-body">
          <table>
            <thead><tr><th>椤圭洰</th><th>浼樺寲鍓?/th><th>浼樺寲鍚?/th></tr></thead>
            <tbody>
              <tr><td>$and</td><td>11</td><td>6</td></tr>
              <tr><td>$or</td><td>7</td><td>3</td></tr>
              <tr><td>$mux</td><td>2</td><td>2</td></tr>
              <tr><td>閫昏緫灞傜骇</td><td>5</td><td>3</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section>
        <div class="section-title">鏃跺簭杩濅緥 <span class="tag">slack</span></div>
        <div class="side-body">
          <table>
            <thead><tr><th>璺緞</th><th>寤惰繜</th><th>鐘舵€?/th></tr></thead>
            <tbody>
              <tr><td>a -> y</td><td>2.58ns</td><td class="good">閫氳繃</td></tr>
              <tr><td>b -> z</td><td>2.31ns</td><td class="good">閫氳繃</td></tr>
              <tr><td>sel -> y</td><td>2.94ns</td><td class="warn">鎺ヨ繎绾︽潫</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section>
        <div class="section-title">绛変环楠岃瘉 <span class="tag">鏃ュ織</span></div>
        <pre class="log">[1] 璇诲彇璁捐 top
[2] 鎵ц my_opt_expr: 鎶樺彔 5 涓父閲忚〃杈惧紡
[3] 鎵ц my_opt_cse: 鍚堝苟 3 缁勫叕鍏卞瓙琛ㄨ揪寮?[4] 鎵ц my_opt_rewrite: 鎻愬彇鍏叡鍥犲瓙 a
[5] 鎵ц my_opt_algdiv: 鐢熸垚 2 涓?quotient
[6] 鎵ц my_opt_cover / my_opt_qm: 鍒犻櫎 4 涓啑浣?cube
[7] 鎵ц my_opt_timing: WNS = +0.42ns
[8] 绛変环楠岃瘉閫氳繃: 浼樺寲鍓嶅悗杈撳嚭涓€鑷?/pre>
      </section>
    </aside>
  </main>
</body>
</html>
